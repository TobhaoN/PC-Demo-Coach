<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Demo Coach — Cox Automotive MSS</title>
<style>
:root {
  --trust:#1D3E74;--joyride:#024AA5;--power:#0C80DF;--aqua:#00BCDD;
  --orange:#FF8210;--bg:#f3f5f9;--card:#fff;--text:#1a2a3a;--muted:#6b7d8e;
  --border:#e0e5ed;--green:#1a9a5a;--red:#d44;--radius:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.55;min-height:100vh}
.header{background:linear-gradient(135deg,#0d1a2e 0%,var(--trust) 100%);padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.header .logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--power),var(--aqua));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:#fff;flex-shrink:0}
.header h1{font-size:15px;font-weight:700;color:#fff}
.header small{font-size:10px;color:rgba(255,255,255,.4);display:block}
.phase-tabs{display:flex;gap:3px;margin-left:auto}
.phase-tab{padding:6px 14px;border-radius:8px;border:none;background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.phase-tab:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7)}
.phase-tab.active{background:rgba(12,128,223,.25);color:#fff;box-shadow:inset 0 -2px 0 var(--aqua)}
.phase-tab .num{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.12);font-size:9px;margin-right:5px}
.phase-tab.active .num{background:var(--aqua);color:var(--trust)}
.phase-tab.done .num{background:var(--green);color:#fff}
.reset-btn{padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.4);font-size:10px;cursor:pointer;font-family:inherit;margin-left:6px}
.reset-btn:hover{border-color:var(--orange);color:var(--orange)}
.container{max-width:900px;margin:0 auto;padding:16px 20px 50px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:0 1px 4px rgba(29,62,116,.04);margin-bottom:12px}
.card h3{font-size:14px;font-weight:700;color:var(--trust);margin-bottom:6px}
.card p,.card li{font-size:12.5px;color:var(--muted);line-height:1.6}
.card ul{padding-left:16px}
.card li{margin:2px 0}
.card strong{color:var(--text)}
label.field{display:block;margin-bottom:12px}
label.field .label-text{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px;display:block}
select,input[type=text]{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:12.5px;font-family:inherit;outline:none;background:var(--bg);transition:border-color .15s}
select:focus,input:focus{border-color:var(--power);background:#fff}
.persona-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px;margin-bottom:10px}
.persona-chip{padding:10px 12px;border-radius:8px;border:2px solid var(--border);background:var(--card);cursor:pointer;transition:all .15s;text-align:left}
.persona-chip:hover{border-color:var(--power);box-shadow:0 2px 8px rgba(12,128,223,.08)}
.persona-chip.selected{border-color:var(--power);background:#0C80DF08}
.persona-chip .emoji{font-size:18px}
.persona-chip .name{font-size:12px;font-weight:700;color:var(--trust)}
.persona-chip .role{font-size:10px;color:var(--muted)}
.pill-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.pill{padding:4px 12px;border-radius:18px;border:1.5px solid var(--border);background:var(--card);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;color:var(--muted)}
.pill:hover{border-color:var(--power);color:var(--power)}
.pill.selected{background:var(--power);color:#fff;border-color:var(--power)}
.pill.sub{font-size:10px;padding:3px 10px;margin-left:8px;border-style:dashed}
.gp-block{padding:10px 12px;border-radius:8px;margin-bottom:8px;font-size:12px;line-height:1.6}
.gp-block.blue{background:#f0f7ff;border-left:3px solid var(--power)}
.gp-block.green{background:#f0fdf5;border-left:3px solid var(--green)}
.gp-block.orange{background:#fffaf5;border-left:3px solid var(--orange)}
.gp-block.aqua{background:#f0fafc;border-left:3px solid var(--aqua)}
.gp-block h4{font-size:12px;font-weight:700;color:var(--trust);margin-bottom:4px}
.gp-block ul{padding-left:14px;margin:2px 0}
.gp-block li{margin:2px 0}
.gp-block .q{color:var(--joyride);font-weight:600}
.time-bar{display:flex;border-radius:5px;overflow:hidden;height:22px;margin:6px 0;font-size:9px;font-weight:700;color:#fff}
.time-bar .seg{display:flex;align-items:center;justify-content:center}
.seg-disc{background:var(--aqua)}.seg-demo{background:var(--power)}.seg-close{background:var(--green)}
.live-panel{background:var(--card);border:2px solid var(--power);border-radius:12px;overflow:hidden}
.live-header{background:linear-gradient(90deg,var(--trust),var(--joyride));padding:10px 14px;color:#fff;display:flex;align-items:center;gap:10px}
.live-timer{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:1px}
.live-body{padding:12px}
.timer-btn{padding:4px 12px;border-radius:5px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit}
.timer-btn:hover{background:rgba(255,255,255,.2)}
.lp{padding:10px 14px;border-radius:8px;margin-bottom:8px;font-size:13px;line-height:1.5}
.lp.ask{background:#f0f7ff;border-left:3px solid var(--power)}
.lp.warn{background:#fff5f0;border-left:3px solid var(--orange)}
.lp.do{background:#f0fdf5;border-left:3px solid var(--green)}
.lp .tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;display:block}
.lp .tag.blue{color:var(--power)}.lp .tag.orange{color:var(--orange)}.lp .tag.green{color:var(--green)}
.lp .big{font-size:15px;font-weight:700;color:var(--trust)}
.btn-primary{padding:8px 20px;border-radius:7px;border:none;background:linear-gradient(135deg,var(--power),var(--joyride));color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(12,128,223,.2)}
.btn-primary:hover{transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-secondary{padding:6px 14px;border-radius:7px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-secondary:hover{border-color:var(--power);color:var(--power)}
.section-title{font-size:16px;font-weight:800;color:var(--trust);margin-bottom:3px}
.section-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.flow-step{display:flex;gap:10px;align-items:flex-start;margin:6px 0;padding:8px 10px;background:#fff;border-radius:6px}
.flow-num{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--power),var(--aqua));color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.flow-step .products{font-size:10px;color:var(--aqua);font-weight:600}
@media(max-width:768px){.phase-tabs{flex-wrap:wrap;gap:2px}.phase-tab{padding:5px 8px;font-size:10px}.persona-grid{grid-template-columns:1fr 1fr}.container{padding:10px}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">DC</div>
  <div><h1>Demo Coach</h1><small>Cox Automotive MSS</small></div>
  <div class="phase-tabs">
    <button class="phase-tab active" onclick="goPhase(1)" data-phase="1"><span class="num">1</span>Game Plan</button>
    <button class="phase-tab" onclick="goPhase(2)" data-phase="2"><span class="num">2</span>Live</button>
    <button class="phase-tab" onclick="goPhase(3)" data-phase="3"><span class="num">3</span>Copilot</button>
  </div>
  <button class="reset-btn" onclick="resetAll()">Reset</button>
</div>
<div class="container" id="app"></div>
<script>
const PERSONAS={dp:{id:'dp',emoji:'🏛️',name:'Dealer Principal / Owner',role:'Owner, big-picture, ROI-obsessed',language:['ROI','market share','brand reputation','headcount efficiency'],openingQ:'"What\'s the biggest challenge facing your stores right now that technology should be solving but isn\'t?"',productQs:{'VinSolutions':'"How confident are you that your CRM is capturing every opportunity?"','vAuto':'"Are you satisfied with your used car turn rate across all stores?"','Dealer.com':'"Is your website generating leads on its own, or is it just a digital brochure?"','Deal Central':'"How much gross are you leaving on the table when customers know more than your salespeople?"','Dealertrack DMS':'"What are you paying monthly just to connect your systems together?"','AMP':'"Do you know which previous customers are shopping right now — before they tell you?"'},demoFrame:'Show ROI and competitive advantage. Management dashboards, not user workflows.',followUp:'Short email to RSM with ROI summary. DPs decide fast — don\'t let momentum stall.',goldenInsight:'DPs think in terms of the whole business, not departments. Show portfolio-level impact.'},gm:{id:'gm',emoji:'👔',name:'General Manager',role:'P&L owner, management visibility',language:['net profit','management visibility','CSI','accountability'],openingQ:'"When you pull up yesterday\'s numbers, what makes you smile or reach for the Advil?"',productQs:{'VinSolutions':'"How do you know if your salespeople are working leads vs. cherry-picking?"','vAuto':'"When a unit hits 45 days, how quickly does your team react?"','Dealer.com':'"Can you see which CRM customers are shopping your website right now?"','Deal Central':'"What happens when a customer walks in knowing more about the deal than your salesperson?"','Dealertrack DMS':'"How many hours does your back office spend reconciling what the floor says happened?"','Xtime':'"What percentage of sold customers come back for first service?"','AMP':'"How are you marketing to customers shopping but haven\'t raised their hand?"'},demoFrame:'Show MANAGEMENT view — reports, dashboards, accountability. Not the user screen.',followUp:'Short email — 3 paragraphs max. Recap pain points. Propose specific next step.',goldenInsight:'GMs buy management visibility. Every feature must answer: "How will I know if my people are doing their job?"'},gsm:{id:'gsm',emoji:'🏪',name:'General Sales Manager',role:'Runs the floor, tactical, fast-paced',language:['close rate','gross','ups','deals','accountability'],openingQ:'"How many ups did you have yesterday, and how many left without a pencil?"',productQs:{'VinSolutions':'"When a lead comes in, how fast does your team actually touch it?"','Deal Central':'"What does your salesperson do when a customer already knows the price, payment, and trade?"','Dealer.com':'"When someone starts a deal on your website, does your team know before they walk in?"'},demoFrame:'Show a deal in motion. Saturday morning scenario. Fast, deal-focused. Match their energy.',followUp:'TEXT, not email. Reference something specific from the demo.',goldenInsight:'3-minute attention window. Tactical, not strategic. Show how to catch the deal before it walks.'},internet:{id:'internet',emoji:'💻',name:'Internet / BDC Director',role:'Systems architect, data-driven',language:['data flow','API','attribution','lead response time','integration'],openingQ:'"When a lead comes in at 9 PM Thursday, what happens between that moment and when a human engages — where does it break?"',productQs:{'VinSolutions':'"How are you tracking attribution from lead source through to sold?"','Dealer.com':'"What does your website analytics tell you about conversion — do you trust the numbers?"','AMP':'"How do you know which marketing channel actually drove the sale?"','DDC Advertising':'"Can you see closed-loop attribution from ad impression to delivered unit?"'},demoFrame:'Show the data JOURNEY through connected systems. Integration architecture, not feature tours.',followUp:'Email with substance: integration points, API docs, case study from similar tech stack.',goldenInsight:'Technical gatekeeper. Vague integration answers kill trust. Bring specifics or lose credibility.'},fixedops:{id:'fixedops',emoji:'🔧',name:'Fixed Ops Director',role:'Service & parts, retention-focused',language:['ELR','hours per RO','absorption rate','customer retention'],openingQ:'"What percentage of sold customers come back for first service, and how confident are you in that number?"',productQs:{'Xtime':'"How are you managing capacity during peak hours — are customers self-scheduling?"','VinSolutions':'"When a service customer is in the market for a new vehicle, how does sales find out?"','Dealertrack DMS':'"How does service data flow to accounting — any manual reconciliation?"'},demoFrame:'Show the retention lifecycle: buy → service → re-engage. Connect sale to service lane.',followUp:'Case study from similar group with KPIs: retention rate, RO count, ELR improvement.',goldenInsight:'Fixed ops = ~50% of gross profit but gets ~10% of demo airtime. Leading with service earns massive differentiation.'},usedcar:{id:'usedcar',emoji:'🚗',name:'Used Car Manager',role:'Inventory-obsessed, time is money',language:['turn time','days to front-line','gross','market data','recon'],openingQ:'"What\'s your average days from acquisition to front-line, and what\'s the bottleneck killing your turn?"',productQs:{'vAuto':'"Show me a unit that\'s been here 40+ days — what does your pricing strategy look like?"','VinSolutions':'"Can you see which CRM leads are tied to specific inventory when you\'re pricing?"','Dealer.com':'"How quickly do price changes hit your website and third-party listings?"'},demoFrame:'Pull up REAL VINs from their lot. Show specific pricing insights. Keep it under 15 min.',followUp:'Text with one actionable insight on a real unit. Prove value before they sign.',goldenInsight:'2-minute attention window. Bring VIN-specific data. Every second not about speed or profit is a second they\'re leaving.'},fi:{id:'fi',emoji:'📋',name:'F&I Director',role:'Revenue + compliance dual lens',language:['PVR','compliance','chargebacks','funding speed','deal structure'],openingQ:'"When you review deal jackets at month-end, what\'s the most common error creating compliance risk?"',productQs:{'UNIFI / F&I':'"Walk me through a 620-score customer on a used vehicle — how does your current process handle lender requirements?"','Deal Central':'"When a deal comes to F&I, how much data do you have to re-enter?"','Dealertrack DMS':'"How long from F&I completion to funding — days or weeks?"'},demoFrame:'Use a REALISTIC credit scenario (620 score, Tier 3). Never demo with a perfect customer.',followUp:'Compliance-focused case study. Metrics: funding speed, chargeback reduction.',goldenInsight:'Open with compliance, then layer revenue. Leading with "how this protects your dealership" wins.'},controller:{id:'controller',emoji:'📊',name:'Controller / CFO',role:'Accuracy, cost, reconciliation',language:['reconciliation','posting accuracy','GL coding','TCO','manual touchpoints'],openingQ:'"How many hours per month does your team spend reconciling what the sales floor says happened vs. what posted to the DMS?"',productQs:{'Dealertrack DMS':'"What are you paying in integration fees to connect your CRM, website, and inventory tools?"','VinSolutions':'"When a deal is marked sold in the CRM, how long until it shows in your books — and is it accurate?"'},demoFrame:'Show what happens AFTER the deal. Data flow to DMS, GL coding, error reduction.',followUp:'TCO analysis: implementation cost, labor savings in hours/month/store, error rate reduction.',goldenInsight:'Controllers are forgotten in demos. She controls the budget and catches every mistake.'},marketing:{id:'marketing',emoji:'📣',name:'Marketing Director',role:'Lead gen, attribution, ad spend ROI',language:['CPL','attribution','SEO','lead quality','conversion rate','ad spend ROI'],openingQ:'"Which lead source gives you the best cost-per-lead this month — and which one frustrates you most?"',productQs:{'DDC Advertising':'"Can you see which ads are driving sold units — not just clicks?"','Dealer.com':'"What\'s your website conversion rate, and what are you doing to improve it?"','AMP':'"How are you re-engaging past customers before they shop a competitor?"'},demoFrame:'Show the full marketing funnel with attribution at every step. DDC → Dealer.com → VinSolutions → AMP.',followUp:'Email with campaign analytics, CPL benchmarks, case study showing lead quality improvement.',goldenInsight:'Marketing Directors live and die by attribution. Show closed-loop tracking from ad impression to sold deal.'}};
const PRODUCTS=[{id:'VinSolutions',label:'VinSolutions'},{id:'vAuto',label:'vAuto'},{id:'Dealer.com',label:'Dealer.com'},{id:'Deal Central',label:'Deal Central'},{id:'Dealertrack DMS',label:'Dealertrack DMS'},{id:'Xtime',label:'Xtime'},{id:'AMP',label:'AMP'},{id:'DDC Advertising',label:'DDC Advertising',subs:['AMD','AMD Elite']},{id:'UNIFI / F&I',label:'UNIFI / F&I'}];
const CONNECTED_FLOW=[{phase:'Consumer Shopping',time:'2-3m',products:'Autotrader + Dealer.com + DDC Advertising',script:'Customer shops AT/KBB → DDC targets with VIN-level ads → lands on Dealer.com with personalized payments, no login required.'},{phase:'Inventory & Pricing',time:'2-3m',products:'vAuto + Dealer.com + Autotrader',script:'vAuto prices with Profit Time AI + Manheim/AT/KBB data. Prices flow to website and listings in real time.'},{phase:'Lead & Engagement',time:'2-3m',products:'Dealer.com + VinSolutions + AMP',script:'Lead arrives enriched with AT/KBB shopping data. Predictive Insights scores it. AMP shows browsing behavior. Salesperson sees it all on the task page.'},{phase:'Deal Building',time:'3-4m',products:'VinSolutions + Deal Central',script:'Deal Central builds transparent proposal. Online-to-showroom continuity. One deal, one data set, zero re-entry.'},{phase:'F&I + DMS',time:'2-3m',products:'Deal Central + UNIFI + Dealertrack DMS',script:'Deal flows to F&I — no re-keying. UNIFI handles lenders + compliance. Posts to DMS with proper GL coding. Funding: 28 days → 48 hours.'},{phase:'Service + Loop',time:'2-3m',products:'Xtime + VinSolutions + AMP + vAuto',script:'Xtime schedules first service. Service drive becomes acquisition channel via KBB ICO. AMP re-engages when they shop again. The loop closes.'}];
let state={phase:1,r360:false,selectedPersonas:[],personaNames:{},selectedProducts:[],selectedSubs:{},demoMinutes:30,gamePlanGenerated:false,timerRunning:false,timerSeconds:0,timerInterval:null};
function goPhase(n){state.phase=n;document.querySelectorAll('.phase-tab').forEach(t=>t.classList.toggle('active',t.dataset.phase==n));render()}
function resetAll(){if(state.timerInterval)clearInterval(state.timerInterval);state={phase:1,r360:false,selectedPersonas:[],personaNames:{},selectedProducts:[],selectedSubs:{},demoMinutes:30,gamePlanGenerated:false,timerRunning:false,timerSeconds:0,timerInterval:null};document.querySelectorAll('.phase-tab').forEach(t=>{t.classList.remove('done');t.classList.toggle('active',t.dataset.phase=='1')});render()}
function togglePersona(id){const i=state.selectedPersonas.indexOf(id);if(i>-1)state.selectedPersonas.splice(i,1);else state.selectedPersonas.push(id);render()}
function toggleProduct(id){const i=state.selectedProducts.indexOf(id);if(i>-1)state.selectedProducts.splice(i,1);else state.selectedProducts.push(id);render()}
function toggleSub(parent,sub){if(!state.selectedSubs[parent])state.selectedSubs[parent]=[];const i=state.selectedSubs[parent].indexOf(sub);if(i>-1)state.selectedSubs[parent].splice(i,1);else state.selectedSubs[parent].push(sub);render()}
function toggleR360(){state.r360=!state.r360;if(state.r360)state.demoMinutes=20;render()}
function toggleTimer(){if(state.timerRunning){clearInterval(state.timerInterval);state.timerRunning=false}else{state.timerRunning=true;state.timerInterval=setInterval(()=>{state.timerSeconds++;render()},1000)}render()}
function resetTimer(){clearInterval(state.timerInterval);state.timerRunning=false;state.timerSeconds=0;render()}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function generateGamePlan(){state.gamePlanGenerated=true;document.querySelector('[data-phase="1"]').classList.add('done');render()}

function renderPhase1(){
  if(state.gamePlanGenerated)return renderGamePlan();
  return `<h2 class="section-title">Pre-Call Game Plan</h2><p class="section-sub">Quick setup → one-page cheat sheet for your demo.</p>
    <div class="card"><h3>Who's on the call?</h3>
      <div class="persona-grid">${Object.values(PERSONAS).map(p=>`<div class="persona-chip ${state.selectedPersonas.includes(p.id)?'selected':''}" onclick="togglePersona('${p.id}')"><span class="emoji">${p.emoji}</span> <span class="name">${p.name}</span><div class="role">${p.role}</div></div>`).join('')}</div>
    </div>
    ${state.selectedPersonas.length?`<div class="card"><h3>Names <span style="font-weight:400;font-size:10px;color:var(--muted)">(optional — improves copilot)</span></h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:6px">
        ${state.selectedPersonas.map(id=>{const p=PERSONAS[id];return`<div style="display:flex;align-items:center;gap:6px"><span style="font-size:14px">${p.emoji}</span><span style="font-size:11px;font-weight:600;color:var(--trust);min-width:80px">${p.name}</span><input type="text" value="${state.personaNames[id]||''}" onchange="state.personaNames['${id}']=this.value" placeholder="Name..." style="flex:1;padding:5px 8px;font-size:11px"></div>`}).join('')}
      </div></div>`:''}
    <div class="card"><h3>What are you demoing?</h3>
      <div style="margin-bottom:10px;padding:10px 12px;border-radius:8px;border:2px solid ${state.r360?'var(--aqua)':'var(--border)'};background:${state.r360?'#00BCDD08':'var(--card)'};cursor:pointer;display:flex;align-items:center;gap:10px" onclick="toggleR360()">
        <div style="width:36px;height:36px;border-radius:8px;background:${state.r360?'linear-gradient(135deg,var(--power),var(--aqua))':'var(--bg)'};display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${state.r360?'🔄':'⭕'}</div>
        <div style="flex:1"><div style="font-size:13px;font-weight:700;color:${state.r360?'var(--trust)':'var(--muted)'}">Cox Connected Demo</div><div style="font-size:10px;color:var(--muted)">15-20 min full ecosystem walkthrough</div></div>
      </div>
      <p style="font-size:10px;color:var(--muted);margin-bottom:6px">${state.r360?'✓ Connected Demo selected. Add products below for deeper dives after:':'Select products:'}</p>
      <div class="pill-row">${PRODUCTS.map(p=>{let h=`<button class="pill ${state.selectedProducts.includes(p.id)?'selected':''}" onclick="toggleProduct('${p.id}')">${p.label}</button>`;if(p.subs&&state.selectedProducts.includes(p.id)){p.subs.forEach(s=>{h+=`<button class="pill sub ${(state.selectedSubs[p.id]||[]).includes(s)?'selected':''}" onclick="toggleSub('${p.id}','${s}')">${s}</button>`})}return h}).join('')}</div>
      ${state.r360&&state.selectedProducts.length?`<p style="font-size:10px;color:var(--power);font-weight:600">📋 Connected Demo (15-20m) → ${state.selectedProducts.join(', ')} deep dive${state.selectedProducts.length>1?'s':''}</p>`:''}
    </div>
    <div class="card"><label class="field" style="margin:0"><span class="label-text">Time available</span>
      <select onchange="state.demoMinutes=parseInt(this.value)">${[15,20,30,45,60].map(m=>`<option value="${m}" ${state.demoMinutes===m?'selected':''}>${m} min</option>`).join('')}</select>
    </label></div>
    <button class="btn-primary" onclick="generateGamePlan()" ${state.selectedPersonas.length===0?'disabled':''}>Generate Game Plan →</button>
    ${state.selectedPersonas.length===0?'<span style="font-size:10px;color:var(--muted);margin-left:10px">Select at least one persona</span>':''}`;
}
function renderGamePlan(){
  const personas=state.selectedPersonas.map(id=>PERSONAS[id]);
  const totalMin=state.demoMinutes;
  const discMin=Math.min(5,Math.round(totalMin*.15));
  const closeMin=Math.round(totalMin*.12);
  const demoMin=totalMin-discMin-closeMin;
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
    <div><h2 class="section-title">Your Game Plan</h2><p class="section-sub" style="margin:0">${totalMin}m · ${personas.map(p=>p.emoji+' '+(state.personaNames[p.id]||p.name)).join(', ')}</p></div>
    <div style="display:flex;gap:4px"><button class="btn-secondary" onclick="state.gamePlanGenerated=false;render()">← Edit</button><button class="btn-primary" onclick="goPhase(2)">Start Demo →</button></div></div>`;
  html+=`<div class="gp-block blue"><h4>⏱ Time Budget</h4>
    <div class="time-bar"><div class="seg seg-disc" style="width:${discMin/totalMin*100}%">Open ${discMin}m</div><div class="seg seg-demo" style="width:${demoMin/totalMin*100}%">Demo ${demoMin}m</div><div class="seg seg-close" style="width:${closeMin/totalMin*100}%">Close ${closeMin}m</div></div>
    <p style="font-size:11px">Discovery is a thread, not a phase — keep asking questions throughout, not just upfront.</p></div>`;
  if(state.r360){
    html+=`<div class="gp-block aqua"><h4>🔄 Cox Connected Demo Flow</h4>
      ${CONNECTED_FLOW.map((s,i)=>`<div class="flow-step"><div class="flow-num">${i+1}</div><div><strong style="font-size:12px">${s.phase}</strong> <span style="font-size:10px;color:var(--muted)">(${s.time})</span><div class="products">${s.products}</div><p style="font-size:11px;margin-top:2px">${s.script}</p></div></div>`).join('')}
      <p style="font-size:11px;margin-top:6px"><strong>Key phrases:</strong> "Hub of the wheel" · "Zero integration fees" · "First-party data nobody else has" · "One customer record, zero re-entry"</p></div>`;
    if(state.selectedProducts.length){
      html+=`<div class="gp-block green"><h4>🔎 Deep Dives After Connected Demo</h4>
        <p style="font-size:11px;margin-bottom:4px">Transition: "Now that you've seen how the ecosystem connects, let me show you [product] and how it addresses [their pain]."</p>
        ${state.selectedProducts.map(p=>`<div style="padding:4px 0;font-size:12px"><strong>${p}</strong> <span style="color:var(--muted)">— ~10-15 min, tailored to ${personas.map(pe=>state.personaNames[pe.id]||pe.name).join(' + ')}</span></div>`).join('')}</div>`;
    }
  }
  html+=`<div class="gp-block blue"><h4>🎯 Opening & Discovery Questions</h4>
    <p style="font-size:11px;margin-bottom:6px">Open with 1-2 of these, then weave the rest in during the demo. Don't front-load — it becomes an inquisition.</p>`;
  personas.forEach(p=>{
    const name=state.personaNames[p.id]||p.name;
    html+=`<div style="padding:6px 0;border-bottom:1px solid var(--border)"><strong>${p.emoji} ${name}</strong>: <span class="q">${p.openingQ}</span></div>`;
    const prodQs=[];
    state.selectedProducts.forEach(prod=>{if(p.productQs&&p.productQs[prod])prodQs.push({prod,q:p.productQs[prod]})});
    if(prodQs.length) prodQs.forEach(pq=>{html+=`<div style="padding:3px 0 3px 20px;font-size:11px"><span style="color:var(--aqua);font-weight:600">${pq.prod}:</span> <span class="q">${pq.q}</span></div>`});
  });
  html+=`</div>`;
  html+=`<div class="gp-block green"><h4>🎬 How to Demo for This Room</h4>`;
  personas.forEach(p=>{html+=`<div style="padding:4px 0;font-size:12px"><strong>${p.emoji} ${state.personaNames[p.id]||p.name}:</strong> ${p.demoFrame}</div>`});
  html+=`</div>`;
  const warns=[];
  if(personas.length>2)warns.push('3+ people — call on people by name often. Silence on Teams = multitasking.');
  if(personas.some(p=>p.id==='fixedops')&&personas.length>1)warns.push('Fixed Ops on the call — don\'t save service for the end.');
  if(personas.some(p=>p.id==='fi')&&personas.length>1)warns.push('F&I on the call — don\'t bolt it on as last 5 minutes.');
  if(personas.some(p=>p.id==='controller'))warns.push('Controller on the call — send a one-pager BEFORE the meeting.');
  if(personas.some(p=>p.id==='usedcar'))warns.push('Used Car Manager — bring VINs from their lot to keep them engaged.');
  warns.push('Basics: camera on, share app window (not full screen), close tabs, game plan on second monitor.');
  html+=`<div class="gp-block orange"><h4>📹 Virtual Demo Tips</h4><ul>${warns.map(w=>`<li style="font-size:11px">${w}</li>`).join('')}</ul></div>`;
  html+=`<div class="gp-block green"><h4>✅ Close — Hand Off to Regional</h4>
    <ul><li><span class="q">"Do you want [RSM] to put together a quote?"</span></li>
    <li><span class="q">"What do next steps look like on your end?"</span></li>
    <li><span class="q">"What are your blockers?"</span></li>
    <li><span class="q">"When does your current contract come up?"</span></li>
    <li><span class="q">"Who else needs to see this before a decision?"</span></li></ul>
    <p style="font-size:10px;color:var(--orange);margin-top:4px">⚠️ Don't quote pricing — that's the RSM's lane. Don't use "On a scale of 1-10." Don't end with "Any questions?"</p></div>`;
  return html;
}
function renderPhase2(){
  const personas=state.selectedPersonas.map(id=>PERSONAS[id]);
  if(!personas.length)return`<div class="card"><p>Complete your Game Plan first.</p><button class="btn-primary" onclick="goPhase(1)">← Game Plan</button></div>`;
  const totalSec=state.demoMinutes*60,elapsed=state.timerSeconds,remaining=Math.max(0,totalSec-elapsed);
  const mins=Math.floor(elapsed/60),secs=elapsed%60,remMins=Math.floor(remaining/60),remSecs=remaining%60;
  const discEnd=Math.min(5,Math.round(state.demoMinutes*.15)),closeStart=state.demoMinutes-Math.round(state.demoMinutes*.12);
  let phaseName='Opening',phaseColor='var(--aqua)';
  if(mins>=closeStart){phaseName='Close';phaseColor='var(--green)'}else if(mins>=discEnd){phaseName='Demo';phaseColor='var(--power)'}
  let html=`<div class="live-panel"><div class="live-header">
    <div><div style="font-size:10px;opacity:.6">${phaseName}</div><div class="live-timer">${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}</div></div>
    <div style="flex:1;text-align:center"><div style="font-size:10px;opacity:.6">Left</div><div style="font-size:16px;font-weight:700">${remMins}m ${remSecs}s</div></div>
    <div style="display:flex;gap:4px"><button class="timer-btn" onclick="toggleTimer()">${state.timerRunning?'⏸ Pause':'▶ Start'}</button><button class="timer-btn" onclick="resetTimer()">↺</button></div>
  </div><div class="live-body">`;
  if(mins<discEnd){
    html+=`<div class="lp ask"><span class="tag blue">OPENING — ASK, DON'T SHOW YET</span><div class="big">Pick 1-2 questions. Listen. Then demo toward what they told you.</div></div>`;
    personas.forEach(p=>{const name=state.personaNames[p.id]||p.name;html+=`<div class="lp ask"><span class="tag blue">${p.emoji} ${name}</span><div style="font-size:14px;font-weight:600;color:var(--joyride)">${p.openingQ}</div></div>`});
  }else if(mins<closeStart){
    html+=`<div class="lp do"><span class="tag green">DEMO — CONNECT TO THEIR PAIN</span><div class="big">Only show what connects to something they told you. Skip the rest.</div></div>`;
    if(mins>discEnd+3&&mins<closeStart-5)html+=`<div class="lp ask"><span class="tag blue">🔄 MID-DEMO CHECK-IN</span><div style="font-size:14px;font-weight:600;color:var(--joyride)">"Is this the kind of thing that would change how your team handles this?"</div></div>`;
    if(state.r360){const demoLen=closeStart-discEnd,elap=mins-discEnd,stepTime=demoLen/CONNECTED_FLOW.length,cur=Math.min(Math.floor(elap/stepTime),CONNECTED_FLOW.length-1),step=CONNECTED_FLOW[cur];
      html+=`<div class="lp do"><span class="tag green">STEP ${cur+1}: ${step.phase.toUpperCase()}</span><div class="products" style="margin:2px 0">${step.products}</div><div style="font-size:13px">${step.script}</div></div>`}
    personas.forEach(p=>{const name=state.personaNames[p.id]||p.name;html+=`<div class="lp do" style="padding:8px 12px"><span style="font-size:11px"><strong>${p.emoji} ${name}:</strong> ${p.demoFrame}</span></div>`});
  }else{
    html+=`<div class="lp do"><span class="tag green">CLOSE — HAND OFF TO REGIONAL</span><div class="big">Stop showing features. Summarize and ask:</div></div>`;
    html+=`<div class="lp do"><div style="font-size:14px;font-weight:600;color:var(--trust)">"Do you want [RSM] to put together a quote?"</div><div style="font-size:14px;font-weight:600;color:var(--trust);margin-top:4px">"What do next steps look like on your end?"</div><div style="font-size:14px;font-weight:600;color:var(--trust);margin-top:4px">"What are your blockers?"</div></div>`;
  }
  html+=`<details style="margin-top:8px"><summary style="font-size:11px;font-weight:700;color:var(--orange);cursor:pointer">🚨 Engagement Rescue</summary>
    <div class="lp warn" style="margin-top:6px"><div><strong>Quiet room:</strong> "I want to make sure I'm showing what matters — what's the biggest challenge we haven't touched?"</div>
    <div style="margin-top:4px"><strong>Checked out:</strong> Call by name: "[Name], how does your team handle this currently?"</div>
    <div style="margin-top:4px"><strong>Off-topic:</strong> "Great question — let me bookmark that. I want to cover [their pain] while we have time."</div></div></details>`;
  html+=`</div></div>`;
  html+=`<div style="margin-top:12px;text-align:right"><button class="btn-primary" onclick="if(state.timerRunning){clearInterval(state.timerInterval);state.timerRunning=false;}document.querySelector('[data-phase=&quot;2&quot;]').classList.add('done');goPhase(3)">Demo Complete → Copilot Prompt</button></div>`;
  return html;
}
function generateCopilotPrompt(personas){
  const personaList=personas.map(p=>{const name=state.personaNames[p.id];return name?`- ${name} — ${p.name} (${p.role})`:`- ${p.name} (${p.role})`}).join('\n');
  const productList=state.r360?'Cox Connected Demo (Full Ecosystem)'+(state.selectedProducts.length?' + Deep dives: '+state.selectedProducts.join(', '):''):state.selectedProducts.join(', ')||'Not specified';
  const nameNote=personas.some(p=>state.personaNames[p.id])?'\nUse actual names (not just roles) throughout.':'';
  return `You are a Cox Automotive PC Demo Copilot. Analyze the attached recording/transcript and produce CONCISE post-demo documentation. Bullet points, not paragraphs. Keep the entire output under 2 pages.

DEMO CONTEXT:
Products: ${productList}
Time: ${state.demoMinutes} min
People on the call:
${personaList}${nameNote}

PRODUCE EXACTLY THREE SECTIONS:

## 1. DEMO NOTES (half page max)
- **Discovery findings**: Pain points surfaced, current stack, frustrations — in their words.
- **Key moments**: Features that got reactions (positive or negative). Questions they asked (these reveal priorities).
- **Objections**: Each one verbatim, who said it, resolved or not.

## 2. SENTIMENT (one line per person)
Format: Name — Role — 🟢🟡🟠🔴 — what excited them / what concerned them.
Overall: 🟢 Hot / 🟡 Warm / 🟠 Cool / 🔴 Cold — one sentence why.

## 3. RSM ACTION ITEMS (max 5, numbered)
Each: What to do → who → by when → what to say (reference the demo).
Include unresolved objections, missing stakeholders, contract timing if mentioned.

RULES: Be brief. Use dealer's actual words. If the PC missed an opportunity, add a one-sentence "PC Note" at the end.`;
}

function renderPhase3(){
  const personas=state.selectedPersonas.map(id=>PERSONAS[id]);
  if(!personas.length)return`<div class="card"><p>Complete your Game Plan first.</p><button class="btn-primary" onclick="goPhase(1)">← Game Plan</button></div>`;
  if(state.timerRunning){clearInterval(state.timerInterval);state.timerRunning=false}
  const prompt=generateCopilotPrompt(personas);
  return `<h2 class="section-title">Post-Demo Copilot</h2><p class="section-sub">Copy → paste into Copilot with your recording → structured notes + RSM action items.</p>
    <div class="card" style="border-top:3px solid var(--aqua)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <h3 style="margin:0">📋 Copilot Prompt</h3>
        <button class="btn-primary" style="padding:6px 14px;font-size:11px" onclick="copyPrompt()">Copy to Clipboard</button>
      </div>
      <div id="copilotPrompt" style="background:#f5f7fa;border:1px solid var(--border);border-radius:8px;padding:12px;font-size:11.5px;line-height:1.65;white-space:pre-wrap;font-family:inherit;max-height:400px;overflow-y:auto;color:var(--text)">${escapeHtml(prompt)}</div>
    </div>
    <div class="card"><h3>How to Use</h3><p style="font-size:12px">1. Record your demo (Teams/Zoom) → 2. Copy prompt above → 3. Paste into Copilot with recording → 4. Send output to RSM</p></div>
    <div class="card"><h3>Follow-Up by Persona</h3>
      ${personas.map(p=>{const name=state.personaNames[p.id];return`<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px"><strong>${p.emoji} ${name?name+' — ':''}${p.name}:</strong> ${p.followUp}</div>`}).join('')}
    </div>`;
}

function copyPrompt(){
  const personas=state.selectedPersonas.map(id=>PERSONAS[id]);
  const prompt=generateCopilotPrompt(personas);
  navigator.clipboard.writeText(prompt).then(()=>{
    const btn=document.querySelector('[onclick="copyPrompt()"]');
    if(btn){btn.textContent='✓ Copied!';btn.style.background='var(--green)';setTimeout(()=>{btn.textContent='Copy to Clipboard';btn.style.background=''},2000)}
  }).catch(()=>{const el=document.getElementById('copilotPrompt');const r=document.createRange();r.selectNodeContents(el);window.getSelection().removeAllRanges();window.getSelection().addRange(r);alert('Press Ctrl+C to copy.')});
}

function render(){
  const app=document.getElementById('app');
  switch(state.phase){case 1:app.innerHTML=renderPhase1();break;case 2:app.innerHTML=renderPhase2();break;case 3:app.innerHTML=renderPhase3();break}
}
render();
</script>
</body>
</html>
